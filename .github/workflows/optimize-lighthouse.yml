name: Optimize Lighthouse

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/optimize-lighthouse.yml
      - scripts/apply-lighthouse-optimizations.py
      - scripts/optimize-portfolio-images.js
      - scripts/lighthouse-static-server.js
      - src/styles/brand-evidence-polish.css
      - public/robots.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'human-centered-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund

      - name: Generate responsive WebP previews
        run: node scripts/optimize-portfolio-images.js

      - name: Apply CSS, responsive-image and cache optimizations
        run: python scripts/apply-lighthouse-optimizations.py

      - name: Build and verify all public outputs
        run: |
          npm run build
          npm run verify:render
          npm run pdf

      - name: Run production-like Lighthouse audits
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lighthouse-output
          node scripts/lighthouse-static-server.js > /tmp/lighthouse-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && break; sleep 1; done
          export CHROME_PATH="$(node -e "console.log(require('puppeteer').executablePath())")"
          npx --yes lighthouse@12.8.2 http://127.0.0.1:4173/index.html \
            --quiet --chrome-flags='--headless --no-sandbox --disable-dev-shm-usage' \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json --output-path=lighthouse-output/mobile.json
          npx --yes lighthouse@12.8.2 http://127.0.0.1:4173/index.html \
            --quiet --preset=desktop --chrome-flags='--headless --no-sandbox --disable-dev-shm-usage' \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json --output-path=lighthouse-output/desktop.json
          node - <<'NODE'
          const fs = require('node:fs');
          let failed = false;
          for (const mode of ['mobile', 'desktop']) {
            const report = JSON.parse(fs.readFileSync(`lighthouse-output/${mode}.json`, 'utf8'));
            const scores = Object.fromEntries(Object.entries(report.categories).map(([key, value]) => [key, Math.round(value.score * 100)]));
            console.log(`${mode}:`, scores);
            fs.writeFileSync(`lighthouse-output/${mode}-scores.json`, JSON.stringify(scores, null, 2));
            for (const category of ['accessibility', 'best-practices', 'seo']) {
              if (scores[category] !== 100) failed = true;
            }
            const minimumPerformance = mode === 'mobile' ? 90 : 95;
            if (scores.performance < minimumPerformance) failed = true;
          }
          if (failed) process.exit(1);
          NODE

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optimized-lighthouse-audit
          path: lighthouse-output/**/*
          if-no-files-found: error
          retention-days: 14

      - name: Commit verified optimized assets and outputs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            astro.config.mjs data/portfolio-human.js src/layouts/Layout.astro src/pages/integrity.astro src/pages/index.astro \
            src/styles/portfolio-v5.css scripts/verify-dist.js public/_headers \
            public/media/work/*-400.webp public/media/work/*-800.webp \
            index.html integrity.html security.html cv.html cv-resume.html cv-research.html cv-editorial.html cv-integrity.html \
            llms.txt llms-full.txt cv-llm.txt public/llms.txt public/llms-full.txt public/cv-llm.txt public/data/source.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'performance: ship responsive images and production delivery optimizations'
          git push origin HEAD:human-centered-redesign
