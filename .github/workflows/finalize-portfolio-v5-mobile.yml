name: Finalize portfolio v5 mobile

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/finalize-portfolio-v5-mobile.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'human-centered-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Localize visualizations and compact mobile card groups
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/media/work
          UA='Mozilla/5.0 Chrome/124 Safari/537.36'
          curl -L --fail --retry 3 -A "$UA" \
            'https://upload.wikimedia.org/wikipedia/commons/5/53/Oesophageal_Cancer%2C_Age-Standardized_Rate_%28World%29_per_100.000_of_Incidence_Cases%2C_Both_sexes%2C_Worldwide_in_2022.svg' \
            -o public/media/work/flourish-oesophageal-cancer.svg
          curl -L --fail --retry 3 -A "$UA" \
            'https://upload.wikimedia.org/wikipedia/commons/6/69/Overlapping_clinical_phenotypes_in_genes_associated_with_monogenic_forms_of_autism_spectrum_disorder_%28ASD%29%2C_dystonia%2C_epilepsy_and_schizophrenia.svg' \
            -o public/media/work/wikimedia-clinical-overlap.svg
          test -s public/media/work/flourish-oesophageal-cancer.svg
          test -s public/media/work/wikimedia-clinical-overlap.svg

          python - <<'PY'
          from pathlib import Path

          data_path = Path('data/portfolio-human.js')
          data = data_path.read_text()
          replacements = {
            'https://upload.wikimedia.org/wikipedia/commons/5/53/Oesophageal_Cancer%2C_Age-Standardized_Rate_%28World%29_per_100.000_of_Incidence_Cases%2C_Both_sexes%2C_Worldwide_in_2022.svg': '/media/work/flourish-oesophageal-cancer.svg',
            'https://upload.wikimedia.org/wikipedia/commons/7/7f/Diagram_of_overlap_between_genes_which_are_affected_in_various_mental_disorders.svg': '/media/work/wikimedia-clinical-overlap.svg'
          }
          for old, new in replacements.items():
              if old not in data:
                  raise SystemExit(f'Missing visualization reference: {old}')
              data = data.replace(old, new, 1)
          data_path.write_text(data)

          css_path = Path('src/styles/portfolio-v5.css')
          css = css_path.read_text()
          marker = '/* mobile horizontal evidence rails */'
          if marker not in css:
              css += '''\n\n/* mobile horizontal evidence rails */\n@media (max-width: 680px) {\n  .p5-flagship-grid,\n  .p5-products,\n  .p5-visuals,\n  .p5-documents {\n    display: flex;\n    gap: 14px;\n    width: calc(100% + 14px);\n    margin-right: -14px;\n    padding: 2px 14px 16px 0;\n    overflow-x: auto;\n    overscroll-behavior-inline: contain;\n    scroll-snap-type: x mandatory;\n    scrollbar-width: thin;\n  }\n\n  .p5-flagship,\n  .p5-product,\n  .p5-visual {\n    flex: 0 0 86%;\n    scroll-snap-align: start;\n  }\n\n  .p5-document {\n    flex: 0 0 82%;\n    scroll-snap-align: start;\n  }\n\n  .p5-section { padding: 52px 0; }\n  .p5-section-head { margin-bottom: 24px; }\n  .p5-flagship:last-child,\n  .p5-document:last-child { grid-column: auto; }\n}\n'''
          css_path.write_text(css)

          verify_path = Path('scripts/verify-rendering.js')
          verify = verify_path.read_text()
          old = "if (!result.title.trim() || !result.bodyText.trim()) throw new Error(`${route} rendered empty title or body`);"
          new = "if (!result.title.trim() || !result.bodyText.trim()) throw new Error(`${route} rendered empty title or body`);\n  if (route === 'index.html' && viewport.name === 'mobile' && result.documentHeight > 11000) {\n    throw new Error(`Mobile homepage is excessively long: ${result.documentHeight}px`);\n  }"
          if old not in verify:
              raise SystemExit('Missing rendering assertion insertion point')
          verify_path.write_text(verify.replace(old, new, 1))
          PY
      - run: npm ci --no-audit --no-fund
      - name: Build and verify
        run: npm run build
      - name: Verify responsive rendering
        run: npm run verify:render
      - name: Run scrolled visual audit
        run: node scripts/capture-homepage-v4.js
      - name: Commit verified final state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/portfolio-human.js src/styles/portfolio-v5.css scripts/verify-rendering.js \
            public/media/work/flourish-oesophageal-cancer.svg public/media/work/wikimedia-clinical-overlap.svg \
            index.html integrity.html security.html cv.html cv-resume.html cv-research.html cv-editorial.html cv-integrity.html \
            llms.txt llms-full.txt cv-llm.txt public/llms.txt public/llms-full.txt public/cv-llm.txt public/data/source.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "design: finalize compact mobile portfolio and local visuals"
          git push origin HEAD:human-centered-redesign
