name: Regenerate portfolio v8 output

on:
  push:
    branches: [human-centered-redesign]
    paths:
      - .github/workflows/regenerate-v8-output.yml

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Commit deterministic generated files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            index.html integrity.html security.html cv.html \
            cv-resume.html cv-research.html cv-editorial.html cv-integrity.html \
            llms.txt llms-full.txt cv-llm.txt \
            public/llms.txt public/llms-full.txt public/cv-llm.txt
          if git diff --cached --quiet; then
            echo "Generated outputs are already current."
          else
            git commit -m "build: refresh portfolio v8 generated outputs"
            git push origin HEAD:human-centered-redesign
          fi
