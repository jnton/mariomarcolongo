name: Fix portfolio v8 contrast

on:
  push:
    branches: [human-centered-redesign]
    paths:
      - .github/workflows/fix-v8-contrast.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Strengthen light-theme contrast
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/styles/portfolio-v8.css')
          text = path.read_text()
          replacements = {
              '--v8-muted: #70736d;': '--v8-muted: #60635d;',
              '--v8-red: #f04d32;': '--v8-red: #bd2f1e;',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected CSS token: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Commit contrast fix and generated output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/styles/portfolio-v8.css index.html
          git commit -m "fix: strengthen portfolio v8 text contrast"
          git push origin HEAD:human-centered-redesign
