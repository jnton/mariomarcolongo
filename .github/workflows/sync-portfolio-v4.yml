name: Synchronize portfolio v4

on:
  pull_request:
    branches: [main]
    paths:
      - src/pages/index.astro
      - src/styles/portfolio-human-v2.css
      - src/styles/nav-editorial.css
      - src/components/SiteNav.astro
      - data/portfolio-human.js
      - scripts/check-stale-strings.js
      - scripts/verify-dist.js
      - scripts/verify-rendering.js
      - .github/workflows/sync-portfolio-v4.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  synchronize:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'human-centered-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Build and verify generated output
        run: npm run build
      - name: Commit generated mirrors
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            index.html integrity.html security.html cv.html cv-resume.html cv-research.html cv-editorial.html cv-integrity.html \
            llms.txt llms-full.txt cv-llm.txt \
            public/llms.txt public/llms-full.txt public/cv-llm.txt public/data/source.js
          if git diff --cached --quiet; then
            echo "No synchronized output changes."
            exit 0
          fi
          git commit -m "build: synchronize outcome-led portfolio"
          git push origin HEAD:human-centered-redesign
