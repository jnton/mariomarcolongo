name: Verify portfolio

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run source checks
        run: npm run lint

      - name: Build and verify generated output
        run: npm run build

      - name: Verify rendered pages
        run: |
          if [ -f scripts/verify-rendering.js ]; then
            node scripts/verify-rendering.js
          else
            echo "scripts/verify-rendering.js is missing" >&2
            exit 1
          fi

      - name: Generate résumé PDF
        run: npm run pdf:resume

      - name: Generate full CV PDF
        run: npm run pdf:cv

      - name: Check generated tree cleanliness
        run: git diff --check

      - name: Package exact repository snapshot
        if: always()
        run: tar --exclude=.git -czf ../mariomarcolongo-repo-snapshot.tar.gz .

      - name: Upload repository snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-snapshot
          path: ../mariomarcolongo-repo-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 2

      - name: Upload verification screenshots and PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-output
          path: |
            audit-output/**
            *.pdf
          if-no-files-found: ignore
          retention-days: 7
