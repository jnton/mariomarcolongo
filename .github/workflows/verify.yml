name: Migrate and verify portfolio v3

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'final-audit-repair'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out portfolio branch
        uses: actions/checkout@v4
        with:
          ref: final-audit-repair
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply canonical portfolio migration
        run: node scripts/apply-portfolio-v3-migration.js

      - name: Refresh lockfile and install dependencies
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --no-audit --no-fund

      - name: Build and capture diagnostics
        id: build
        run: |
          set +e
          npm run build > /tmp/portfolio-v3-build.log 2>&1
          status=$?
          set -e
          mkdir -p .github/diagnostics
          tail -n 260 /tmp/portfolio-v3-build.log > .github/diagnostics/portfolio-v3-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Commit diagnostic on build failure
        if: steps.build.outputs.status != '0'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/diagnostics/portfolio-v3-build.log package-lock.json
          git commit -m 'ci: record portfolio v3 build failure [portfolio-v3-diagnostic]'
          git push origin HEAD:final-audit-repair

      - name: Stop after build failure
        if: steps.build.outputs.status != '0'
        run: exit 1

      - name: Verify pages and capture rendering diagnostics
        id: render
        if: steps.build.outputs.status == '0'
        run: |
          set +e
          npm run verify:render > /tmp/portfolio-v3-render.log 2>&1
          status=$?
          set -e
          tail -n 260 /tmp/portfolio-v3-render.log > .github/diagnostics/portfolio-v3-render.log
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Commit diagnostic on rendering failure
        if: steps.build.outputs.status == '0' && steps.render.outputs.status != '0'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/diagnostics/portfolio-v3-render.log package-lock.json
          git commit -m 'ci: record portfolio v3 rendering failure [portfolio-v3-diagnostic]'
          git push origin HEAD:final-audit-repair

      - name: Stop after rendering failure
        if: steps.build.outputs.status == '0' && steps.render.outputs.status != '0'
        run: exit 1

      - name: Generate and validate all CV PDFs
        if: steps.build.outputs.status == '0' && steps.render.outputs.status == '0'
        run: npm run pdf

      - name: Restore permanent CI and commit verified portfolio
        if: steps.build.outputs.status == '0' && steps.render.outputs.status == '0'
        run: |
          cp scripts/verify-portfolio-final.yml .github/workflows/verify.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/sync-portfolio-v3.yml scripts/apply-portfolio-v3-migration.js scripts/verify-portfolio-final.yml
          rm -rf .github/diagnostics
          git add -A
          git diff --cached --check
          git commit -m 'feat: rebuild broad evidence trust research and AI portfolio [portfolio-v3-synced]'
          git push origin HEAD:final-audit-repair
