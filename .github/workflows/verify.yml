name: Migrate and verify portfolio v3

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'final-audit-repair'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out portfolio branch
        uses: actions/checkout@v4
        with:
          ref: final-audit-repair
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply canonical portfolio migration
        run: node scripts/apply-portfolio-v3-migration.js

      - name: Refresh lockfile and install dependencies
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --no-audit --no-fund

      - name: Build and verify generated output
        run: npm run build

      - name: Verify pages interactions themes and responsive rendering
        run: npm run verify:render

      - name: Generate and validate all CV PDFs
        run: npm run pdf

      - name: Restore permanent CI and commit verified portfolio
        run: |
          cp scripts/verify-portfolio-final.yml .github/workflows/verify.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/sync-portfolio-v3.yml scripts/apply-portfolio-v3-migration.js scripts/verify-portfolio-final.yml
          git add -A
          git diff --cached --check
          git commit -m 'feat: rebuild broad evidence trust research and AI portfolio [portfolio-v3-synced]'
          git push origin HEAD:final-audit-repair
