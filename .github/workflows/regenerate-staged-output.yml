name: Regenerate staged output

on:
  pull_request:
    branches: [main]
    types: [synchronize]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    if: github.event.pull_request.head.ref == 'human-centered-redesign' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out redesign branch
        uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Build deterministic public output
        run: npm run build

      - name: Commit generated mirrors and remove this one-shot workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            index.html integrity.html security.html \
            cv.html cv-resume.html cv-research.html cv-editorial.html cv-integrity.html \
            llms.txt llms-full.txt cv-llm.txt \
            public/llms.txt public/llms-full.txt public/cv-llm.txt public/data/source.js
          git rm .github/workflows/regenerate-staged-output.yml
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "build: regenerate staged portfolio output"
          git push origin HEAD:human-centered-redesign
