name: Apply localized portfolio media

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-local-media-v4.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'human-centered-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Replace hotlinked media and stale verification strings
        run: |
          python - <<'PY'
          from pathlib import Path

          data_path = Path('data/portfolio-human.js')
          data = data_path.read_text()
          replacements = {
            'https://lh3.googleusercontent.com/1KKa3LqvJ6ayP9Kh6_jmAWXzL3naOfPnnKtWb8vjd25XMn1ELMNFDxGjgtvShNmDhWG4x_uuynunm9lVD7wQ3hAI=s1280-w1280-h800': '/media/work/mdpi-filter-1.jpg',
            'https://lh3.googleusercontent.com/PFwTjvBGc7yEyomiAhZYB60HVcqcIRJaWjRndm8CukDwCOikYyErU9tBqOzMUhF-HTXv4wGyKNbsjvIjNyU0NpSO=s1280-w1280-h800': '/media/work/mdpi-filter-2.jpg',
            'https://cdn4.telesco.pe/file/pZUg4_EKmf_XKFJ1mesezgQCQNLUEoEhIf2PkVmxn5E97MKs43H7Rx6S6PEwzST3GM9HzoiCT4H7ec5i6S6xuluOYwyLWfj4Z0OqNl2vgkqCGMulAXGcUqnWRiMVglqDNCC4fkKuT0m8YizUQMbkISnpnt-8cV509X3_CDf76FETk3ApwGce1QWt54xjuYYALbOrOh_FGuk3ll7i5HoMKyGiFVvqSWXYAdCah1O8B9EAFMwIDA4taSh5m466VLqI55mg8SXvTz0gICVeV1N9e5eR0B-t4ZONBAE-kbM-hvhG5L4VCuvlmx0hLudnq-rttkia6aTbKohf3lrCwc6r_g.jpg': '/media/work/telegram-bot.jpg',
            'https://public.tableau.com/views/TavolediMortalitSingoleEtItalia-ISTAT/Sheet1.png?:showVizHome=no': '/media/work/tableau-mortality.png'
          }
          for old, new in replacements.items():
              if old not in data:
                  raise SystemExit(f'Missing expected media URL: {old[:80]}')
              data = data.replace(old, new)
          data_path.write_text(data)

          verify_path = Path('scripts/verify-dist.js')
          verify = verify_path.read_text()
          verify = verify.replace(
              "assertContains(index, 'public.tableau.com/views/TavolediMortalitSingoleEtItalia-ISTAT/Sheet1.png', 'dist/index.html');",
              "assertContains(index, '/media/work/tableau-mortality.png', 'dist/index.html');"
          )
          verify_path.write_text(verify)
          PY
      - run: npm ci --no-audit --no-fund
      - name: Build and verify
        run: npm run build
      - name: Commit localized references and generated mirrors
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/portfolio-human.js scripts/verify-dist.js index.html integrity.html security.html cv.html cv-resume.html cv-research.html cv-editorial.html cv-integrity.html llms.txt llms-full.txt cv-llm.txt public/llms.txt public/llms-full.txt public/cv-llm.txt public/data/source.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "media: use localized portfolio previews"
          git push origin HEAD:human-centered-redesign
