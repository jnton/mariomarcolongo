name: Sync career v2 outputs

on:
  push:
    branches: [final-audit-repair]

permissions:
  contents: write

jobs:
  sync:
    if: "!contains(github.event.head_commit.message, '[career-v2-synced]')"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out portfolio branch
        uses: actions/checkout@v4
        with:
          ref: final-audit-repair
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Refresh lockfile and install dependencies
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --no-audit --no-fund

      - name: Build and verify source outputs
        run: npm run build

      - name: Verify rendered pages and PDFs
        run: |
          npm run verify:render
          npm run pdf:resume
          npm run pdf:cv

      - name: Commit generated outputs and remove one-shot workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/sync-career-v2.yml
          git add -A
          git diff --cached --check
          git commit -m 'build: sync recruiter-focused portfolio outputs [career-v2-synced]'
          git push origin HEAD:final-audit-repair
