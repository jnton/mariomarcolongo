name: Sync career v2 outputs

on:
  push:
    branches: [final-audit-repair]

permissions:
  contents: write

jobs:
  sync:
    if: "!contains(github.event.head_commit.message, '[career-v2-synced]') && !contains(github.event.head_commit.message, '[career-v2-diagnostic]')"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out portfolio branch
        uses: actions/checkout@v4
        with:
          ref: final-audit-repair
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Refresh lockfile and install dependencies
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --no-audit --no-fund

      - name: Build and capture diagnostics
        id: build
        run: |
          set +e
          npm run build > /tmp/career-v2-build.log 2>&1
          status=$?
          set -e
          mkdir -p .github/diagnostics
          tail -n 240 /tmp/career-v2-build.log > .github/diagnostics/career-v2-build.log
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Commit diagnostic on failure
        if: steps.build.outputs.status != '0'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/diagnostics/career-v2-build.log package-lock.json
          git commit -m 'ci: record career v2 build failure [career-v2-diagnostic]'
          git push origin HEAD:final-audit-repair

      - name: Stop after diagnostic failure
        if: steps.build.outputs.status != '0'
        run: exit 1

      - name: Verify rendered pages and PDFs
        if: steps.build.outputs.status == '0'
        run: |
          npm run verify:render
          npm run pdf:resume
          npm run pdf:cv

      - name: Commit generated outputs and remove one-shot workflow
        if: steps.build.outputs.status == '0'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/sync-career-v2.yml
          rm -rf .github/diagnostics
          git add -A
          git diff --cached --check
          git commit -m 'build: sync recruiter-focused portfolio outputs [career-v2-synced]'
          git push origin HEAD:final-audit-repair
