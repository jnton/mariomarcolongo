name: Apply brand and evidence corrections

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-brand-and-evidence.yml
      - scripts/apply-brand-evidence-updates.py
      - src/components/SiteNav.astro
      - src/styles/brand-evidence-polish.css
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'human-centered-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund

      - name: Apply career, evidence and verification updates
        run: python scripts/apply-brand-evidence-updates.py

      - name: Download official Telegram bot avatar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/media/work
          curl -L --fail --retry 3 -A 'Mozilla/5.0 Chrome/124 Safari/537.36' \
            'https://t.me/i/userpic/320/ToEnWikipediaBot.jpg' \
            -o public/media/work/telegram-bot-avatar.jpg
          file public/media/work/telegram-bot-avatar.jpg | grep -Eq 'JPEG|PNG|Web/P image'
          test -s public/media/work/telegram-bot-avatar.jpg

      - name: Generate favicon and social preview images
        run: node scripts/generate-brand-assets.js

      - name: Build and verify repository
        id: verify
        shell: bash
        run: |
          set -o pipefail
          npm run build > /tmp/build.log 2>&1 || { tail -n 220 /tmp/build.log; exit 1; }
          npm run verify:render > /tmp/render.log 2>&1 || { tail -n 220 /tmp/render.log; exit 1; }
          npm run pdf > /tmp/pdf.log 2>&1 || { tail -n 220 /tmp/pdf.log; exit 1; }

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brand-evidence-verification-logs
          path: |
            /tmp/build.log
            /tmp/render.log
            /tmp/pdf.log
          if-no-files-found: warn
          retention-days: 7

      - name: Run local Lighthouse audits
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lighthouse-output
          python3 -m http.server 4173 --directory dist > /tmp/mm-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/index.html >/dev/null && break; sleep 1; done
          export CHROME_PATH="$(node -e "console.log(require('puppeteer').executablePath())")"
          npx --yes lighthouse@12.8.2 http://127.0.0.1:4173/index.html \
            --quiet --chrome-flags='--headless --no-sandbox --disable-dev-shm-usage' \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json --output-path=lighthouse-output/mobile.json
          npx --yes lighthouse@12.8.2 http://127.0.0.1:4173/index.html \
            --quiet --preset=desktop --chrome-flags='--headless --no-sandbox --disable-dev-shm-usage' \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json --output-path=lighthouse-output/desktop.json
          node - <<'NODE'
          const fs = require('node:fs');
          for (const mode of ['mobile', 'desktop']) {
            const report = JSON.parse(fs.readFileSync(`lighthouse-output/${mode}.json`, 'utf8'));
            const scores = Object.fromEntries(Object.entries(report.categories).map(([key, value]) => [key, Math.round(value.score * 100)]));
            console.log(`${mode}:`, scores);
            fs.writeFileSync(`lighthouse-output/${mode}-scores.json`, JSON.stringify(scores, null, 2));
          }
          NODE

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-brand-evidence-audit
          path: lighthouse-output/**/*
          if-no-files-found: warn
          retention-days: 14

      - name: Commit verified source and generated assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            data/source.js data/application-profiles.js scripts/check-stale-strings.js scripts/verify-dist.js scripts/verify-rendering.js \
            src/styles/portfolio-v5.css public/media/work/telegram-bot-avatar.jpg \
            public/favicon-48x48.png public/favicon-192x192.png public/favicon-512x512.png public/apple-touch-icon.png public/og \
            index.html integrity.html security.html cv.html cv-resume.html cv-research.html cv-editorial.html cv-integrity.html \
            llms.txt llms-full.txt cv-llm.txt public/llms.txt public/llms-full.txt public/cv-llm.txt public/data/source.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'brand: correct evidence previews, positioning and social assets'
          git push origin HEAD:human-centered-redesign
