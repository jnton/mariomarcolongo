name: Apply Telegram product card

on:
  pull_request:
    branches: [main]
    paths:
      - public/media/work/telegram-bot-card.svg
      - .github/workflows/apply-telegram-card.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'human-centered-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Switch Telegram references to the stable card
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('data/portfolio-human.js')
          text = path.read_text()
          old = '/media/work/telegram-bot.jpg'
          if text.count(old) != 2:
              raise SystemExit(f'Expected two Telegram image references, found {text.count(old)}')
          path.write_text(text.replace(old, '/media/work/telegram-bot-card.svg'))
          PY
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Commit Telegram card and generated mirrors
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/portfolio-human.js index.html integrity.html security.html cv.html cv-resume.html cv-research.html cv-editorial.html cv-integrity.html llms.txt llms-full.txt cv-llm.txt public/llms.txt public/llms-full.txt public/cv-llm.txt public/data/source.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "media: use stable Telegram bot card"
          git push origin HEAD:human-centered-redesign
