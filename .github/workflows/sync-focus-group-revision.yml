name: Sync focus-group positioning revision

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'final-audit-repair'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out portfolio branch
        uses: actions/checkout@v4
        with:
          ref: final-audit-repair
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply privacy-safe focus-group revision
        run: node scripts/apply-focus-group-revision.js

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Build and verify generated output
        run: npm run build

      - name: Verify interactions and responsive rendering
        run: npm run verify:render

      - name: Generate and validate all CV PDFs
        run: npm run pdf

      - name: Commit verified revision
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/sync-focus-group-revision.yml scripts/apply-focus-group-revision.js
          git add -A
          git diff --cached --check
          git commit -m 'feat: restore focus-group facilitation as a major privacy-safe experience'
          git push origin HEAD:final-audit-repair
