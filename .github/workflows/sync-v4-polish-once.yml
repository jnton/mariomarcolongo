name: Synchronize v4 polish once

on:
  pull_request:
    branches: [main]
    paths:
      - src/styles/portfolio-v4-polish.css
      - src/components/SiteNav.astro
      - .github/workflows/sync-v4-polish-once.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  synchronize:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'human-centered-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Commit generated mirrors
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html integrity.html security.html cv.html cv-resume.html cv-research.html cv-editorial.html cv-integrity.html llms.txt llms-full.txt cv-llm.txt public/llms.txt public/llms-full.txt public/cv-llm.txt public/data/source.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "build: synchronize final portfolio v4 polish"
          git push origin HEAD:human-centered-redesign
