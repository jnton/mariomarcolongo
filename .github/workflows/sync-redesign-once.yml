name: Synchronize redesign once
on:
  pull_request:
    branches: [main]
    paths:
      - src/styles/human-mobile-fixes.css
      - .github/workflows/sync-redesign-once.yml
permissions:
  contents: write
jobs:
  sync:
    if: github.head_ref == 'human-centered-redesign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html integrity.html security.html cv.html cv-resume.html cv-research.html cv-editorial.html cv-integrity.html llms.txt llms-full.txt cv-llm.txt public/llms.txt public/llms-full.txt public/cv-llm.txt public/data/source.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "build: synchronize no-JS marquee fix"
          git push origin HEAD:human-centered-redesign
