name: Localize portfolio media

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/localize-portfolio-media.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  localize:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'human-centered-redesign'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: human-centered-redesign
      - name: Prepare media directory
        run: mkdir -p public/media/work
      - name: Download MDPI screenshot one
        id: mdpi1
        continue-on-error: true
        run: curl -L --fail --retry 2 -A 'Mozilla/5.0 Chrome/124 Safari/537.36' 'https://lh3.googleusercontent.com/1KKa3LqvJ6ayP9Kh6_jmAWXzL3naOfPnnKtWb8vjd25XMn1ELMNFDxGjgtvShNmDhWG4x_uuynunm9lVD7wQ3hAI=s1280-w1280-h800' -o public/media/work/mdpi-filter-1.jpg
      - name: Download MDPI screenshot two
        id: mdpi2
        continue-on-error: true
        run: curl -L --fail --retry 2 -A 'Mozilla/5.0 Chrome/124 Safari/537.36' 'https://lh3.googleusercontent.com/PFwTjvBGc7yEyomiAhZYB60HVcqcIRJaWjRndm8CukDwCOikYyErU9tBqOzMUhF-HTXv4wGyKNbsjvIjNyU0NpSO=s1280-w1280-h800' -o public/media/work/mdpi-filter-2.jpg
      - name: Download Telegram bot image
        id: telegram
        continue-on-error: true
        run: curl -L --fail --retry 2 -A 'Mozilla/5.0 Chrome/124 Safari/537.36' 'https://cdn4.telesco.pe/file/pZUg4_EKmf_XKFJ1mesezgQCQNLUEoEhIf2PkVmxn5E97MKs43H7Rx6S6PEwzST3GM9HzoiCT4H7ec5i6S6xuluOYwyLWfj4Z0OqNl2vgkqCGMulAXGcUqnWRiMVglqDNCC4fkKuT0m8YizUQMbkISnpnt-8cV509X3_CDf76FETk3ApwGce1QWt54xjuYYALbOrOh_FGuk3ll7i5HoMKyGiFVvqSWXYAdCah1O8B9EAFMwIDA4taSh5m466VLqI55mg8SXvTz0gICVeV1N9e5eR0B-t4ZONBAE-kbM-hvhG5L4VCuvlmx0hLudnq-rttkia6aTbKohf3lrCwc6r_g.jpg' -o public/media/work/telegram-bot.jpg
      - name: Download Tableau static view
        id: tableau
        continue-on-error: true
        run: curl -L --fail --retry 2 -A 'Mozilla/5.0 Chrome/124 Safari/537.36' 'https://public.tableau.com/views/TavolediMortalitSingoleEtItalia-ISTAT/Sheet1.png?:showVizHome=no' -o public/media/work/tableau-mortality.png
      - name: Report localized files
        run: |
          find public/media/work -maxdepth 1 -type f \( -name 'mdpi-filter-*.jpg' -o -name 'telegram-bot.jpg' -o -name 'tableau-mortality.png' \) -print -exec file {} \;
      - name: Commit successful localized media
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          find public/media/work -maxdepth 1 -type f \( -name 'mdpi-filter-*.jpg' -o -name 'telegram-bot.jpg' -o -name 'tableau-mortality.png' \) -print0 | xargs -0 -r git add
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "media: localize available product previews"
          git push origin HEAD:human-centered-redesign
