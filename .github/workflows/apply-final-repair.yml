name: Apply final repair

on:
  push:
    branches: [final-audit-repair]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ hashFiles('.github/repair-ready') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          ref: final-audit-repair
          fetch-depth: 0

      - name: Reconstruct, verify, and apply source patch
        run: |
          cat .github/repair-parts/part-* > /tmp/source-repair.patch
          echo '27a76f20e2f1e4acb884f20e3bf545c1bf8fec534e762c58934a88a11d67e0a1  /tmp/source-repair.patch' | sha256sum -c -
          git apply --check /tmp/source-repair.patch
          git apply /tmp/source-repair.patch

      - name: Generate lockfile and verified build outputs
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --no-audit --no-fund
          npm run build
          git diff --check

      - name: Stage final repository state and remove transfer machinery
        run: |
          git add -A
          git rm -r .github/repair-parts .github/repair-ready .github/workflows/apply-final-repair.yml
          git diff --cached --check

      - name: Commit and push repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: complete portfolio audit and release hardening'
          git push origin HEAD:final-audit-repair
